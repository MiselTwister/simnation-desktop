name: Build SimNation Hub Installer

on:
  workflow_dispatch: # Manual trigger via the "Run Workflow" button

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # Required to create the Release and upload files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # ⬅️ Changed to Stable LTS so the action doesn't crash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable # ⬅️ Ensures the build server has the right Rust tools

      - name: Install NPM dependencies
        run: npm install
        working-directory: ./telemetry-hub # ⬅️ Tells GitHub to look in your new project folder

      - name: Build Tauri App & Create Installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: "./telemetry-hub" # ⬅️ Tells Tauri exactly where to build from
          tagName: v__VERSION__ 
          releaseName: "SimNation Hub v__VERSION__"
          # 📝 The text users see in the update popup
          releaseBody: "The all-new SimNation Hub! Includes the Frameless Radio Panel, Smart Game Overlay, and built-in SCS Telemetry."
          releaseDraft: false
          prerelease: false