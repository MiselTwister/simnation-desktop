name: Build SimNation Installer

on:
  workflow_dispatch: # Manual trigger via the "Run Workflow" button

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # Required to create the Release and upload files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install NPM dependencies
        run: npm install

      - name: Build Tauri App & Create Installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 🔐 NEW: These connect your GitHub Secrets to the build process
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ 
          releaseName: "SimNation Radio v__VERSION__"
          # 📝 This is the text users see in the update popup!
          releaseBody: "A new version of SimNation Radio is available! Optimization fixes and Game Detector updates included. Keep on truckin'!"
          releaseDraft: false
          prerelease: false